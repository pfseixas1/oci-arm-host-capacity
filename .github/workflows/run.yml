name: OCI ARM Instance Creator
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Install OCI CLI
        run: |
          pip install oci-cli --quiet

      - name: Configure OCI CLI
        env:
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.oci
          printf '%s' "$OCI_PRIVATE_KEY" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem
          cat > ~/.oci/config << OCIEOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_ID }}
          fingerprint=${{ secrets.OCI_KEY_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_ID }}
          region=${{ secrets.OCI_REGION }}
          key_file=~/.oci/key.pem
          OCIEOF

      - name: Test auth
        run: oci iam user get --user-id ${{ secrets.OCI_USER_ID }} --query 'data.name' --raw-output

      - name: Launch instance
        run: |
          oci compute instance launch \
            --availability-domain "${{ secrets.OCI_AVAILABILITY_DOMAIN }}" \
            --compartment-id "${{ secrets.OCI_TENANCY_ID }}" \
            --shape "VM.Standard.A1.Flex" \
            --shape-config '{"ocpus":4,"memoryInGBs":24}' \
            --image-id "${{ secrets.OCI_IMAGE_ID }}" \
            --subnet-id "${{ secrets.OCI_SUBNET_ID }}" \
            --ssh-authorized-keys-file <(echo "${{ secrets.OCI_SSH_PUBLIC_KEY }}") \
            --assign-public-ip false \
            --wait-for-state RUNNING \
            --max-wait-seconds 300 \
          || echo "FAILED - will retry next run"

      - name: Validate resources
        run: |
          echo "=== Validating image ==="
          oci compute image get --image-id "${{ secrets.OCI_IMAGE_ID }}" --query 'data.{"displayName":"display-name","lifecycleState":"lifecycle-state"}' 2>&1 || echo "IMAGE INVALID"
          echo "=== Validating subnet ==="
          oci network subnet get --subnet-id "${{ secrets.OCI_SUBNET_ID }}" --query 'data.{"displayName":"display-name","lifecycleState":"lifecycle-state"}' 2>&1 || echo "SUBNET INVALID"
