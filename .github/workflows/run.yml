name: OCI ARM Instance Creator

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install dependencies
        run: composer install --no-interaction

      - name: Write private key
        run: echo "${{ secrets.OCI_PRIVATE_KEY }}" > /tmp/oci_key.pem

      - name: Create .env
        run: |
          echo "OCI_REGION=${{ secrets.OCI_REGION }}" > .env
          echo "OCI_USER_ID=${{ secrets.OCI_USER_ID }}" >> .env
          echo "OCI_TENANCY_ID=${{ secrets.OCI_TENANCY_ID }}" >> .env
          echo "OCI_KEY_FINGERPRINT=${{ secrets.OCI_KEY_FINGERPRINT }}" >> .env
          echo "OCI_PRIVATE_KEY_FILENAME=/tmp/oci_key.pem" >> .env
          echo "OCI_SUBNET_ID=${{ secrets.OCI_SUBNET_ID }}" >> .env
          echo "OCI_IMAGE_ID=${{ secrets.OCI_IMAGE_ID }}" >> .env
          echo 'OCI_SSH_PUBLIC_KEY=${{ secrets.OCI_SSH_PUBLIC_KEY }}' >> .env
          echo "OCI_AVAILABILITY_DOMAIN=${{ secrets.OCI_AVAILABILITY_DOMAIN }}" >> .env
          echo "OCI_SHAPE=VM.Standard.A1.Flex" >> .env
          echo "OCI_OCPUS=4" >> .env
          echo "OCI_MEMORY_IN_GBS=24" >> .env
          echo "OCI_MAX_INSTANCES=1" >> .env

      - name: Run script
        run: php ./index.php
