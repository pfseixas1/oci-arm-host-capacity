name: OCI ARM Instance Creator
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install dependencies
        run: composer install --no-interaction

      - name: Write private key
        env:
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        run: printf '%s' "$OCI_PRIVATE_KEY" > /tmp/oci_key.pem

      - name: Create .env
        env:
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
        run: |
          python3 -c "
          import os
          lines = [
            'OCI_REGION=${{ secrets.OCI_REGION }}',
            'OCI_USER_ID=${{ secrets.OCI_USER_ID }}',
            'OCI_TENANCY_ID=${{ secrets.OCI_TENANCY_ID }}',
            'OCI_KEY_FINGERPRINT=${{ secrets.OCI_KEY_FINGERPRINT }}',
            'OCI_PRIVATE_KEY_FILENAME=/tmp/oci_key.pem',
            'OCI_SUBNET_ID=${{ secrets.OCI_SUBNET_ID }}',
            'OCI_IMAGE_ID=${{ secrets.OCI_IMAGE_ID }}',
            'OCI_SSH_PUBLIC_KEY=\"' + os.environ['OCI_SSH_PUBLIC_KEY'] + '\"',
            'OCI_AVAILABILITY_DOMAIN=${{ secrets.OCI_AVAILABILITY_DOMAIN }}',
            'OCI_SHAPE=VM.Standard.A1.Flex',
            'OCI_OCPUS=4',
            'OCI_MEMORY_IN_GBS=24',
            'OCI_MAX_INSTANCES=1',
            'CACHE_AVAILABILITY_DOMAINS=1',
            'TOO_MANY_REQUESTS_TIME_WAIT=600',
          ]
          open('.env', 'w').write('\n'.join(lines))
          "

      - name: Test availability domains
        run: |
          php -r "
          require 'vendor/autoload.php';
          \$dotenv = Dotenv\Dotenv::createUnsafeImmutable(__DIR__);
          \$dotenv->safeLoad();
          \$signer = new Hitrov\OCI\Signer(
              getenv('OCI_TENANCY_ID'),
              getenv('OCI_USER_ID'),
              getenv('OCI_KEY_FINGERPRINT'),
              getenv('OCI_PRIVATE_KEY_FILENAME')
          );
          \$url = 'https://identity.sa-saopaulo-1.oraclecloud.com/20160918/availabilityDomains?compartmentId=' . getenv('OCI_TENANCY_ID');
          \$headers = \$signer->getHeaders(\$url, 'GET', null, 'application/json');
          \$ch = curl_init(\$url);
          curl_setopt(\$ch, CURLOPT_RETURNTRANSFER, true);
          curl_setopt(\$ch, CURLOPT_HTTPHEADER, \$headers);
          echo curl_exec(\$ch) . PHP_EOL;
          "

      - name: Test create
        run: |
          php -r "
          require 'vendor/autoload.php';
          \$dotenv = Dotenv\Dotenv::createUnsafeImmutable(__DIR__);
          \$dotenv->safeLoad();
          \$signer = new Hitrov\OCI\Signer(
              getenv('OCI_TENANCY_ID'),
              getenv('OCI_USER_ID'),
              getenv('OCI_KEY_FINGERPRINT'),
              getenv('OCI_PRIVATE_KEY_FILENAME')
          );
          \$url = 'https://iaas.sa-saopaulo-1.oraclecloud.com/20160918/instances/';
          \$sshKey = getenv('OCI_SSH_PUBLIC_KEY');
          \$body = '{\"availabilityDomain\":\"GxtN:SA-SAOPAULO-1-AD-1\",\"compartmentId\":\"' . getenv('OCI_TENANCY_ID') . '\",\"shape\":\"VM.Standard.A1.Flex\",\"shapeConfig\":{\"ocpus\":4,\"memoryInGBs\":24},\"sourceDe

      - name: Run script
        run: php ./index.php
