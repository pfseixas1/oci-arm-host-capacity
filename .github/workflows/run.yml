name: OCI ARM Instance Creator
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install dependencies
        run: composer install --no-interaction

      - name: Write private key
        env:
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
        run: printf '%s' "$OCI_PRIVATE_KEY" > /tmp/oci_key.pem

      - name: Show key format
        run: head -1 /tmp/oci_key.pem

      - name: Check fingerprint
        run: openssl pkey -in /tmp/oci_key.pem -pubout 2>/dev/null | openssl md5 -c

      - name: Create .env
        env:
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
        run: |
          python3 -c "
          import os
          lines = [
          'OCI_REGION=${{ secrets.OCI_REGION }}',
          'OCI_USER_ID=${{ secrets.OCI_USER_ID }}',
          'OCI_TENANCY_ID=${{ secrets.OCI_TENANCY_ID }}',
          'OCI_COMPARTMENT_ID=${{ secrets.OCI_TENANCY_ID }}',
          'OCI_KEY_FINGERPRINT=${{ secrets.OCI_KEY_FINGERPRINT }}',
          'OCI_PRIVATE_KEY_FILENAME=/tmp/oci_key.pem',
          'OCI_SUBNET_ID=${{ secrets.OCI_SUBNET_ID }}',
          'OCI_IMAGE_ID=${{ secrets.OCI_IMAGE_ID }}',
          'OCI_SSH_PUBLIC_KEY=\"' + os.environ['OCI_SSH_PUBLIC_KEY'] + '\"',
          'OCI_AVAILABILITY_DOMAIN=${{ secrets.OCI_AVAILABILITY_DOMAIN }}',
          'OCI_SHAPE=VM.Standard.A1.Flex',
          'OCI_OCPUS=4',
          'OCI_MEMORY_IN_GBS=24',
          'OCI_MAX_INSTANCES=1',
          ]
          open('.env', 'w').write('\n'.join(lines))
          "

      - name: Test PHP auth
        run: |
          php -r "
          \$dotenv = Dotenv\Dotenv::createUnsafeImmutable(__DIR__);
          \$dotenv->safeLoad();
          echo 'USER: ' . getenv('OCI_USER_ID') . PHP_EOL;
          echo 'TENANCY: ' . getenv('OCI_TENANCY_ID') . PHP_EOL;
          echo 'FINGERPRINT: ' . getenv('OCI_KEY_FINGERPRINT') . PHP_EOL;
          echo 'KEY: ' . getenv('OCI_PRIVATE_KEY_FILENAME') . PHP_EOL;
          echo 'KEY EXISTS: ' . (file_exists(getenv('OCI_PRIVATE_KEY_FILENAME')) ? 'YES' : 'NO') . PHP_EOL;
          "

      - name: Test API direct
        run: |
          curl -v "https://iaas.sa-saopaulo-1.oraclecloud.com/20160918/instances?compartmentId=ocid1.tenancy.oc1..aaaaaaaavngz554jlrtxzjdsk4lctrecj5vctzrrbmqejh6pelgeimiux6xq" 2>&1 | tail -20

      - name: Run script
        run: php ./index.php
